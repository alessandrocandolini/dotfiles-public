name: Neovim Tests

on:
  pull_request:
    paths:
      - 'nvim/**'
      - 'nvim-tests/**'
      - '.github/workflows/nvim-tests.yml'
      - 'Makefile'
  push:
    branches: [main]
    paths:
      - 'nvim/**'
      - 'nvim-tests/**'
      - '.github/workflows/nvim-tests.yml'
      - 'Makefile'

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      XDG_DATA_HOME: ${{ github.workspace }}/.xdg/data
      XDG_STATE_HOME: ${{ github.workspace }}/.xdg/state
      XDG_CACHE_HOME: ${{ github.workspace }}/.xdg/cache

    steps:
      - uses: actions/checkout@v4

      - name: Setup Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: nightly

      - name: Show Neovim version
        run: nvim --version | head -n 1

      - name: Bootstrap plugins (auto-confirm install)
        run: |
          mkdir -p "$XDG_DATA_HOME" "$XDG_STATE_HOME" "$XDG_CACHE_HOME"
          yes | nvim --headless -u nvim-tests/minimal_init.lua +qa!

      - name: Run headless Neovim tests
        run: make nvim-test
