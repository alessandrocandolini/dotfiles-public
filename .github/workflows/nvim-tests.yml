name: Neovim Tests

on:
  pull_request:
    paths:
      - 'nvim/**'
      - 'nvim-tests/**'
      - '.github/workflows/nvim-tests.yml'
      - 'Makefile'
  push:
    branches: [main]
    paths:
      - 'nvim/**'
      - 'nvim-tests/**'
      - '.github/workflows/nvim-tests.yml'
      - 'Makefile'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: nightly

      - name: Show Neovim version
        run: nvim --version | head -n 1

      - name: Run headless Neovim tests
        run: make nvim-test
